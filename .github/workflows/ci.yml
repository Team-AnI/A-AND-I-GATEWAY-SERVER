name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run tests
        run: ./gradlew test

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: monitor-bot/go.mod

      - name: Run monitor-bot tests
        run: cd monitor-bot && go test ./...

      - name: Build JAR
        run: ./gradlew build -x test

      - name: Validate performance assets
        run: |
          bash -n performance/k6/run-local.sh
          node --check performance/mock-upstream/server.js
          find performance/k6 -name '*.js' -print0 | xargs -0 -n1 node --check
          python3 -m py_compile performance/compare/compare_results.py performance/k6/tools/generate_test_jwt.py
          python3 -m unittest performance.compare.test_compare_results
          docker compose -f performance/mock-upstream/docker-compose.performance.yml config
          git diff --check

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/
