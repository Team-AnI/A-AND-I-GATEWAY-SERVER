name: CI

on:
  push:
    branches: [ main, develop, develop-cicd-parallelization-metrics ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run backend tests
        run: ./gradlew test

      - name: Save backend build outputs
        uses: actions/cache/save@v4
        with:
          path: |
            build/classes
            build/generated
            build/resources
            build/tmp
          key: backend-build-outputs-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: build/reports/tests/test/
          if-no-files-found: ignore

      - name: Upload jacoco report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-jacoco-report
          path: build/reports/jacoco/
          if-no-files-found: ignore

  monitor-bot-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: monitor-bot/go.mod
          cache-dependency-path: monitor-bot/go.sum

      - name: Run monitor-bot tests
        run: cd monitor-bot && go test ./...

  performance-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          K6_VERSION="$(tr -d '[:space:]' < performance/k6/K6_VERSION)"
          curl -fsSL "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz" -o /tmp/k6.tar.gz
          tar -xzf /tmp/k6.tar.gz -C /tmp
          sudo install "/tmp/k6-${K6_VERSION}-linux-amd64/k6" /usr/local/bin/k6
          k6 version

      - name: Validate performance assets
        run: |
          bash -n performance/k6/run-local.sh
          node --check performance/mock-upstream/server.js
          find performance/k6 -name '*.js' -print0 | xargs -0 -n1 node --check
          python3 -m py_compile performance/compare/compare_results.py performance/k6/tools/generate_test_jwt.py performance/aggregate/summarize_gateway_runs.py performance/report/generate_gateway_k6_assets.py scripts/ci/collect_github_actions_metrics.py scripts/ci/compare_cicd_before_after.py
          python3 -m json.tool docs/performance/data/2026-06-20-gateway-local-check.json >/dev/null
          python3 -m json.tool docs/metrics/gateway-cicd-before-after.example.json >/dev/null
          python3 -m json.tool docs/metrics/gateway-cicd-before-after.json >/dev/null
          python3 -m unittest performance.compare.test_compare_results
          python3 -m unittest discover -s performance/aggregate -p 'test_*.py' -v
          python3 -m unittest discover -s performance/report -p 'test_*.py' -v
          python3 performance/report/generate_gateway_k6_assets.py --check --check-readme README.md
          docker compose -f performance/mock-upstream/docker-compose.performance.yml config
          k6 inspect performance/k6/warmup.js
          k6 inspect performance/k6/direct-upstream.js
          k6 inspect performance/k6/gateway-public-route.js
          k6 inspect performance/k6/gateway-protected-route.js
          k6 inspect performance/k6/gateway-error-contract.js
          k6 inspect performance/k6/gateway-rate-limit.js
          git diff --check

  build-jar:
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore backend build outputs
        uses: actions/cache/restore@v4
        with:
          path: |
            build/classes
            build/generated
            build/resources
            build/tmp
          key: backend-build-outputs-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build JAR
        run: ./gradlew bootJar -x test

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: gateway-jar
          path: build/libs/*.jar
          if-no-files-found: error

  ci-summary:
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - monitor-bot-test
      - performance-assets
      - build-jar
    if: always()

    steps:
      - name: Summarize CI jobs
        run: |
          mkdir -p ci-summary
          cat > ci-summary/ci-summary.json <<'JSON'
          {
            "backend-test": "${{ needs.backend-test.result }}",
            "monitor-bot-test": "${{ needs.monitor-bot-test.result }}",
            "performance-assets": "${{ needs.performance-assets.result }}",
            "build-jar": "${{ needs.build-jar.result }}"
          }
          JSON
          {
            echo "## CI Summary"
            echo ""
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| backend-test | ${{ needs.backend-test.result }} |"
            echo "| monitor-bot-test | ${{ needs.monitor-bot-test.result }} |"
            echo "| performance-assets | ${{ needs.performance-assets.result }} |"
            echo "| build-jar | ${{ needs.build-jar.result }} |"
            echo ""
            echo "ci-marker=completed"
          } >> "$GITHUB_STEP_SUMMARY"
          test "${{ needs.backend-test.result }}" = "success"
          test "${{ needs.monitor-bot-test.result }}" = "success"
          test "${{ needs.performance-assets.result }}" = "success"
          test "${{ needs.build-jar.result }}" = "success"

      - name: Upload CI summary
        uses: actions/upload-artifact@v4
        with:
          name: ci-summary
          path: ci-summary/ci-summary.json
