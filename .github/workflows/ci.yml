name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  gateway-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run tests
        run: ./gradlew test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/

  monitor-bot-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: monitor-bot/go.mod

      - name: Run monitor-bot tests
        run: cd monitor-bot && go test ./...

  jar-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build JAR
        run: ./gradlew build -x test

  performance-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          K6_VERSION="$(tr -d '[:space:]' < performance/k6/K6_VERSION)"
          curl -fsSL "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz" -o /tmp/k6.tar.gz
          tar -xzf /tmp/k6.tar.gz -C /tmp
          sudo install "/tmp/k6-${K6_VERSION}-linux-amd64/k6" /usr/local/bin/k6
          k6 version

      - name: Validate performance assets
        run: |
          bash -n performance/k6/run-local.sh
          node --check performance/mock-upstream/server.js
          find performance/k6 -name '*.js' -print0 | xargs -0 -n1 node --check
          python3 -m py_compile performance/compare/compare_results.py performance/k6/tools/generate_test_jwt.py performance/aggregate/summarize_gateway_runs.py performance/report/generate_gateway_k6_assets.py
          python3 -m json.tool docs/performance/data/2026-06-20-gateway-local-check.json >/dev/null
          python3 -m unittest performance.compare.test_compare_results
          python3 -m unittest discover -s performance/aggregate -p 'test_*.py' -v
          python3 -m unittest discover -s performance/report -p 'test_*.py' -v
          python3 performance/report/generate_gateway_k6_assets.py --check --check-readme README.md
          docker compose -f performance/mock-upstream/docker-compose.performance.yml config
          k6 inspect performance/k6/warmup.js
          k6 inspect performance/k6/direct-upstream.js
          k6 inspect performance/k6/gateway-public-route.js
          k6 inspect performance/k6/gateway-protected-route.js
          k6 inspect performance/k6/gateway-error-contract.js
          k6 inspect performance/k6/gateway-rate-limit.js
          git diff --check

  build:
    runs-on: ubuntu-latest
    needs:
      - gateway-tests
      - monitor-bot-tests
      - jar-build
      - performance-assets
    if: always()

    steps:
      - name: Verify CI jobs
        run: |
          test "${{ needs.gateway-tests.result }}" = "success"
          test "${{ needs.monitor-bot-tests.result }}" = "success"
          test "${{ needs.jar-build.result }}" = "success"
          test "${{ needs.performance-assets.result }}" = "success"
