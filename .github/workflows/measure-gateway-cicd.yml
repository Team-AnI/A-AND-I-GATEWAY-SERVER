name: Measure Gateway CI/CD Same Scope

on:
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: Baseline ref to measure
        required: true
        default: main
      candidate_ref:
        description: Candidate ref to measure
        required: true
        default: develop-gateway-cicd-same-scope-remeasure
      iterations:
        description: Number of runs per side
        required: true
        default: "5"
      measurement_profile:
        description: Measurement profile
        required: true
        default: official
        type: choice
        options:
          - official
          - smoke

permissions:
  contents: read

jobs:
  measure:
    name: ${{ matrix.measurement }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - measurement: full-gate-ci-before
            side: before
            scope: full-gate-ci
          - measurement: full-gate-ci-after
            side: after
            scope: full-gate-ci
          - measurement: backend-test-before
            side: before
            scope: backend-test
          - measurement: backend-test-after
            side: after
            scope: backend-test
          - measurement: monitor-bot-test-before
            side: before
            scope: monitor-bot-test
          - measurement: monitor-bot-test-after
            side: after
            scope: monitor-bot-test
          - measurement: performance-assets-before
            side: before
            scope: performance-assets
          - measurement: performance-assets-after
            side: after
            scope: performance-assets
          - measurement: build-jar-same-scope-before
            side: before
            scope: build-jar-same-scope
          - measurement: build-jar-same-scope-after
            side: after
            scope: build-jar-same-scope
          - measurement: cd-dry-run-full-path-before
            side: before
            scope: cd-dry-run-full-path
          - measurement: cd-dry-run-full-path-after
            side: after
            scope: cd-dry-run-full-path
          - measurement: gateway-image-build-only-before
            side: before
            scope: gateway-image-build-only
          - measurement: gateway-image-build-only-after
            side: after
            scope: gateway-image-build-only
          - measurement: monitor-bot-image-build-only-before
            side: before
            scope: monitor-bot-image-build-only
          - measurement: monitor-bot-image-build-only-after
            side: after
            scope: monitor-bot-image-build-only
          - measurement: image-build-warm-cache-before
            side: before
            scope: image-build-warm-cache
          - measurement: image-build-warm-cache-after
            side: after
            scope: image-build-warm-cache

    env:
      ITERATIONS: ${{ inputs.iterations }}
      MEASUREMENT_PROFILE: ${{ inputs.measurement_profile }}
      MEASURE_NAME: ${{ matrix.measurement }}
      MEASURE_SCOPE: ${{ matrix.scope }}
      MEASURE_SIDE: ${{ matrix.side }}
      RESULT_DIR: ${{ runner.temp }}/gateway-cicd-measurements

    steps:
      - name: Checkout measured ref
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.side == 'before' && inputs.baseline_ref || inputs.candidate_ref }}

      - name: Validate measurement inputs
        run: |
          case "$MEASUREMENT_PROFILE" in
            official|smoke) ;;
            *)
              echo "measurement_profile must be official or smoke" >&2
              exit 1
              ;;
          esac

          case "$ITERATIONS" in
            ''|*[!0-9]*)
              echo "iterations must be a positive integer" >&2
              exit 1
              ;;
          esac

          if [ "$ITERATIONS" -lt 1 ]; then
            echo "iterations must be a positive integer" >&2
            exit 1
          fi

          if [ "$MEASUREMENT_PROFILE" = "official" ] && [ "$ITERATIONS" -lt 5 ]; then
            echo "official measurement_profile requires iterations >= 5" >&2
            exit 1
          fi

          {
            echo "measurement=$MEASURE_NAME"
            echo "scope=$MEASURE_SCOPE"
            echo "side=$MEASURE_SIDE"
            echo "measurement-profile=$MEASUREMENT_PROFILE"
            echo "iterations=$ITERATIONS"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Java 21 with Gradle cache
        if: contains('full-gate-ci,backend-test,build-jar-same-scope,cd-dry-run-full-path,gateway-image-build-only,image-build-warm-cache', matrix.scope)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Go
        id: setup-go
        if: contains('full-gate-ci,monitor-bot-test,cd-dry-run-full-path', matrix.scope)
        uses: actions/setup-go@v5
        with:
          go-version-file: monitor-bot/go.mod
          cache: ${{ matrix.side == 'after' }}
          cache-dependency-path: monitor-bot/go.sum

      - name: Log Go cache inputs
        if: contains('full-gate-ci,monitor-bot-test,cd-dry-run-full-path', matrix.scope)
        run: |
          echo "go-version-file=monitor-bot/go.mod"
          echo "cache-dependency-path=monitor-bot/go.sum"
          echo "go-cache-configured=${{ matrix.side == 'after' }}"
          echo "setup-go-cache-hit=${{ steps.setup-go.outputs.cache-hit }}"
          sha256sum monitor-bot/go.sum

      - name: Set up Docker Buildx
        if: contains('cd-dry-run-full-path,gateway-image-build-only,monitor-bot-image-build-only,image-build-warm-cache', matrix.scope)
        uses: docker/setup-buildx-action@v3

      - name: Restore Docker BuildKit cache
        id: buildkit-cache
        if: contains('cd-dry-run-full-path,gateway-image-build-only,monitor-bot-image-build-only,image-build-warm-cache', matrix.scope) && (matrix.side == 'after' || matrix.scope == 'image-build-warm-cache')
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ runner.os }}-${{ matrix.scope }}-${{ matrix.side }}-${{ hashFiles('Dockerfile', 'monitor-bot/Dockerfile', 'monitor-bot/go.sum') }}
          restore-keys: |
            buildx-${{ runner.os }}-${{ matrix.scope }}-${{ matrix.side }}-

      - name: Log BuildKit cache inputs
        if: contains('cd-dry-run-full-path,gateway-image-build-only,monitor-bot-image-build-only,image-build-warm-cache', matrix.scope)
        run: |
          echo "buildkit-cache-configured=${{ matrix.side == 'after' || matrix.scope == 'image-build-warm-cache' }}"
          echo "buildkit-cache-hit=${{ steps.buildkit-cache.outputs.cache-hit }}"

      - name: Read k6 version
        if: contains('full-gate-ci,performance-assets', matrix.scope)
        id: k6-version
        run: |
          k6_version="$(tr -d '[:space:]' < performance/k6/K6_VERSION)"
          test -n "$k6_version"
          echo "version=$k6_version" >> "$GITHUB_OUTPUT"

      - name: Restore k6 binary
        id: k6-cache
        if: matrix.side == 'after' && contains('full-gate-ci,performance-assets', matrix.scope)
        uses: actions/cache@v4
        with:
          path: ~/.cache/k6/${{ steps.k6-version.outputs.version }}/k6
          key: k6-${{ runner.os }}-amd64-${{ steps.k6-version.outputs.version }}

      - name: Log k6 cache inputs
        if: contains('full-gate-ci,performance-assets', matrix.scope)
        run: |
          echo "k6-version=${{ steps.k6-version.outputs.version }}"
          echo "k6-cache-configured=${{ matrix.side == 'after' }}"
          echo "k6-cache-hit=${{ steps.k6-cache.outputs.cache-hit }}"

      - name: Install k6
        if: contains('full-gate-ci,performance-assets', matrix.scope)
        run: scripts/ci/install-k6.sh

      - name: Run measurement scope
        id: run-measurement
        env:
          BASELINE_REF: ${{ inputs.baseline_ref }}
          CANDIDATE_REF: ${{ inputs.candidate_ref }}
          GO_CACHE_CONFIGURED: ${{ contains('full-gate-ci,monitor-bot-test,cd-dry-run-full-path', matrix.scope) && matrix.side == 'after' }}
          GO_CACHE_HIT: ${{ steps.setup-go.outputs.cache-hit }}
          K6_CACHE_CONFIGURED: ${{ contains('full-gate-ci,performance-assets', matrix.scope) && matrix.side == 'after' }}
          K6_CACHE_HIT: ${{ steps.k6-cache.outputs.cache-hit }}
          BUILDKIT_CACHE_CONFIGURED: ${{ contains('cd-dry-run-full-path,gateway-image-build-only,monitor-bot-image-build-only,image-build-warm-cache', matrix.scope) && (matrix.side == 'after' || matrix.scope == 'image-build-warm-cache') }}
          BUILDKIT_CACHE_HIT: ${{ steps.buildkit-cache.outputs.cache-hit }}
        run: |
          set -Eeuo pipefail

          mkdir -p "$RESULT_DIR" measure-artifacts
          runs_jsonl="$RESULT_DIR/${MEASURE_NAME}.jsonl"
          result_json="$RESULT_DIR/${MEASURE_NAME}.json"
          : > "$runs_jsonl"

          run_backend_tests() {
            ./gradlew test --build-cache --no-daemon
          }

          run_backend_test_and_jar() {
            ./gradlew test bootJar --build-cache --no-daemon
            test -f build/libs/app.jar
          }

          build_gateway_jar_only() {
            ./gradlew bootJar --build-cache --no-daemon
            test -f build/libs/app.jar
          }

          run_monitor_bot_tests() {
            (cd monitor-bot && go test ./...)
          }

          run_performance_assets() {
            bash -n scripts/ci/install-k6.sh
            bash -n performance/k6/run-local.sh
            node --check performance/mock-upstream/server.js
            find performance/k6 -name '*.js' -print0 | xargs -0 -n1 node --check
            python3 -m py_compile performance/compare/compare_results.py performance/k6/tools/generate_test_jwt.py performance/aggregate/summarize_gateway_runs.py performance/report/generate_gateway_k6_assets.py
            python3 -m json.tool docs/performance/data/2026-06-20-gateway-local-check.json >/dev/null
            python3 -m unittest performance.compare.test_compare_results
            python3 -m unittest discover -s performance/aggregate -p 'test_*.py' -v
            python3 -m unittest discover -s performance/report -p 'test_*.py' -v
            python3 performance/report/generate_gateway_k6_assets.py --check --check-readme README.md
            docker compose -f performance/mock-upstream/docker-compose.performance.yml config
            k6 inspect performance/k6/warmup.js
            k6 inspect performance/k6/direct-upstream.js
            k6 inspect performance/k6/gateway-public-route.js
            k6 inspect performance/k6/gateway-protected-route.js
            k6 inspect performance/k6/gateway-error-contract.js
            k6 inspect performance/k6/gateway-rate-limit.js
            git diff --check
          }

          docker_cache_enabled() {
            [ "$BUILDKIT_CACHE_CONFIGURED" = "true" ]
          }

          docker_build_local() {
            local cache_name="$1"
            local context="$2"
            local tag="$3"
            local cache_dir="/tmp/.buildx-cache/${cache_name}"
            local new_cache_dir="/tmp/.buildx-cache-new/${cache_name}"
            local cache_args=()

            if docker_cache_enabled; then
              mkdir -p "$cache_dir"
              rm -rf "$new_cache_dir"
              cache_args+=(--cache-from "type=local,src=${cache_dir}")
              cache_args+=(--cache-to "type=local,dest=${new_cache_dir},mode=max")
            fi

            docker buildx build \
              --load \
              --progress=plain \
              --tag "$tag" \
              "${cache_args[@]}" \
              "$context"

            if docker_cache_enabled; then
              rm -rf "$cache_dir"
              mv "$new_cache_dir" "$cache_dir"
            fi
          }

          build_gateway_image_only() {
            docker_build_local gateway . "aandi-gateway-server:measure-${MEASURE_SIDE}"
          }

          build_monitor_bot_image_only() {
            docker_build_local monitor-bot ./monitor-bot "aandi-gateway-monitor-bot:measure-${MEASURE_SIDE}"
          }

          run_cd_dry_run_full_path() {
            run_backend_test_and_jar
            run_monitor_bot_tests
            build_gateway_image_only
            build_monitor_bot_image_only
          }

          run_full_gate_ci() {
            run_backend_test_and_jar
            run_monitor_bot_tests
            run_performance_assets
            cp build/libs/app.jar measure-artifacts/
            cat > "measure-artifacts/${MEASURE_NAME}.json" <<JSON
          {
            "measurement": "${MEASURE_NAME}",
            "scope": "${MEASURE_SCOPE}",
            "side": "${MEASURE_SIDE}",
            "production_deploy_executed": false,
            "aws_ecr_ssh_executed": false,
            "docker_push_executed": false
          }
          JSON
          }

          run_image_build_warm_cache() {
            docker_build_local gateway . "aandi-gateway-server:measure-${MEASURE_SIDE}-prime"
            docker_build_local monitor-bot ./monitor-bot "aandi-gateway-monitor-bot:measure-${MEASURE_SIDE}-prime"
            docker_build_local gateway . "aandi-gateway-server:measure-${MEASURE_SIDE}-warm"
            docker_build_local monitor-bot ./monitor-bot "aandi-gateway-monitor-bot:measure-${MEASURE_SIDE}-warm"
          }

          if [ "$MEASURE_SCOPE" = "gateway-image-build-only" ] || [ "$MEASURE_SCOPE" = "image-build-warm-cache" ]; then
            build_gateway_jar_only
          fi

          failure_count=0
          for iteration in $(seq 1 "$ITERATIONS"); do
            echo "::group::${MEASURE_NAME} iteration ${iteration}/${ITERATIONS}"
            start_ns="$(date +%s%N)"
            set +e
            (
              set -Eeuo pipefail
              case "$MEASURE_SCOPE" in
                full-gate-ci)
                  run_full_gate_ci
                  ;;
                backend-test)
                  run_backend_tests
                  ;;
                monitor-bot-test)
                  run_monitor_bot_tests
                  ;;
                performance-assets)
                  run_performance_assets
                  ;;
                build-jar-same-scope)
                  run_backend_test_and_jar
                  ;;
                cd-dry-run-full-path)
                  run_cd_dry_run_full_path
                  ;;
                gateway-image-build-only)
                  build_gateway_image_only
                  ;;
                monitor-bot-image-build-only)
                  build_monitor_bot_image_only
                  ;;
                image-build-warm-cache)
                  run_image_build_warm_cache
                  ;;
                *)
                  echo "Unknown measurement scope: $MEASURE_SCOPE" >&2
                  exit 1
                  ;;
              esac
            )
            status_code="$?"
            set -e
            end_ns="$(date +%s%N)"
            if [ "$status_code" -eq 0 ]; then
              status="success"
            else
              status="failure"
              failure_count=$((failure_count + 1))
            fi

            python3 - "$runs_jsonl" "$iteration" "$status" "$status_code" "$start_ns" "$end_ns" <<'PY'
          import json
          import sys

          output_path, iteration, status, status_code, start_ns, end_ns = sys.argv[1:]
          duration_seconds = (int(end_ns) - int(start_ns)) / 1_000_000_000
          with open(output_path, "a", encoding="utf-8") as handle:
              handle.write(json.dumps({
                  "iteration": int(iteration),
                  "status": status,
                  "exit_code": int(status_code),
                  "duration_seconds": round(duration_seconds, 3),
              }, ensure_ascii=False) + "\n")
          PY
            echo "::endgroup::"
          done

          python3 - "$runs_jsonl" "$result_json" <<'PY'
          import json
          import os
          import sys

          runs_path, result_path = sys.argv[1:]
          with open(runs_path, encoding="utf-8") as handle:
              runs = [json.loads(line) for line in handle if line.strip()]

          payload = {
              "repository": "Team-AnI/A-AND-I-GATEWAY-SERVER",
              "baseline_ref": os.environ["BASELINE_REF"],
              "candidate_ref": os.environ["CANDIDATE_REF"],
              "measurement_profile": os.environ["MEASUREMENT_PROFILE"],
              "measurement": os.environ["MEASURE_NAME"],
              "scope": os.environ["MEASURE_SCOPE"],
              "side": os.environ["MEASURE_SIDE"],
              "iterations_requested": int(os.environ["ITERATIONS"]),
              "runs": runs,
              "go_cache_configured": os.environ["GO_CACHE_CONFIGURED"] == "true",
              "go_cache_hit_observed": os.environ.get("GO_CACHE_HIT") or "í™•ěť¸ í•„ěš”",
              "k6_cache_configured": os.environ["K6_CACHE_CONFIGURED"] == "true",
              "k6_cache_hit_observed": os.environ.get("K6_CACHE_HIT") or "í™•ěť¸ í•„ěš”",
              "buildkit_cache_configured": os.environ["BUILDKIT_CACHE_CONFIGURED"] == "true",
              "buildkit_cache_hit_observed": os.environ.get("BUILDKIT_CACHE_HIT") or "í™•ěť¸ í•„ěš”",
              "production_deploy_executed": False,
              "docker_push_executed": False,
              "aws_ecr_ssh_executed": False,
          }
          with open(result_path, "w", encoding="utf-8") as handle:
              json.dump(payload, handle, ensure_ascii=False, indent=2)
              handle.write("\n")
          PY

          echo "failure_count=$failure_count" >> "$GITHUB_OUTPUT"

      - name: Upload measurement result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-cicd-measure-${{ matrix.measurement }}-${{ github.run_id }}
          path: ${{ runner.temp }}/gateway-cicd-measurements/${{ matrix.measurement }}.json
          if-no-files-found: warn

      - name: Upload full gate artifacts
        if: always() && matrix.scope == 'full-gate-ci'
        uses: actions/upload-artifact@v4
        with:
          name: measure-${{ matrix.measurement }}-${{ github.run_id }}
          path: measure-artifacts/
          if-no-files-found: warn

      - name: Download full gate artifacts
        if: matrix.scope == 'full-gate-ci'
        uses: actions/download-artifact@v4
        with:
          name: measure-${{ matrix.measurement }}-${{ github.run_id }}
          path: ${{ runner.temp }}/measure-full-gate-download

      - name: Verify full gate artifacts
        if: matrix.scope == 'full-gate-ci'
        run: test -n "$(find "$RUNNER_TEMP/measure-full-gate-download" -type f -print -quit)"

      - name: Fail failed measurement scope
        if: steps.run-measurement.outputs.failure_count != '0'
        run: |
          echo "${{ matrix.measurement }} had ${{ steps.run-measurement.outputs.failure_count }} failed iteration(s)" >&2
          exit 1

  finalize:
    name: Finalize gateway CI/CD metrics
    runs-on: ubuntu-latest
    needs: measure
    if: always()
    steps:
      - name: Checkout candidate ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.candidate_ref }}

      - name: Download measurement results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: gateway-cicd-measure-*
          path: ${{ runner.temp }}/gateway-cicd-results

      - name: Aggregate metrics
        if: always()
        run: |
          python3 scripts/aggregate-gateway-cicd-metrics.py \
            --input-dir "$RUNNER_TEMP/gateway-cicd-results" \
            --output docs/metrics/gateway-cicd-remeasure.json \
            --baseline-ref "${{ inputs.baseline_ref }}" \
            --candidate-ref "${{ inputs.candidate_ref }}" \
            --iterations "${{ inputs.iterations }}" \
            --measurement-profile "${{ inputs.measurement_profile }}"

      - name: Upload final metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-cicd-remeasure-${{ github.run_id }}
          path: docs/metrics/gateway-cicd-remeasure.json
          if-no-files-found: error

      - name: Validate final metrics
        run: python3 scripts/validate-gateway-cicd-metrics.py docs/metrics/gateway-cicd-remeasure.json
