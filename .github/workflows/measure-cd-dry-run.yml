name: Measure CD Dry Run Same Scope

on:
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: Baseline ref to measure
        required: true
        default: main
      candidate_ref:
        description: Candidate ref to measure
        required: true
        default: develop-cicd-evidence-docs
      iterations:
        description: Number of runs per side
        required: true
        default: "5"
      measurement_profile:
        description: Measurement profile
        required: true
        default: official
        type: choice
        options:
          - official
          - smoke

permissions:
  contents: read

jobs:
  measure:
    name: cd-dry-run-${{ matrix.side }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - side: before
          - side: after

    env:
      ITERATIONS: ${{ inputs.iterations }}
      MEASUREMENT_PROFILE: ${{ inputs.measurement_profile }}
      MEASURE_SIDE: ${{ matrix.side }}
      MEASURE_SCOPE: cd-dry-run-same-scope

    steps:
      - name: Checkout measured ref
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.side == 'before' && inputs.baseline_ref || inputs.candidate_ref }}

      - name: Validate measurement inputs
        run: |
          case "$MEASUREMENT_PROFILE" in
            official|smoke) ;;
            *)
              echo "measurement_profile must be official or smoke" >&2
              exit 1
              ;;
          esac

          case "$ITERATIONS" in
            ''|*[!0-9]*)
              echo "iterations must be a positive integer" >&2
              exit 1
              ;;
          esac

          if [ "$ITERATIONS" -lt 1 ]; then
            echo "iterations must be a positive integer" >&2
            exit 1
          fi

          if [ "$MEASUREMENT_PROFILE" = "official" ] && [ "$ITERATIONS" -lt 5 ]; then
            echo "official measurement_profile requires iterations >= 5" >&2
            exit 1
          fi

          {
            echo "scope=$MEASURE_SCOPE"
            echo "side=$MEASURE_SIDE"
            echo "measurement-profile=$MEASUREMENT_PROFILE"
            echo "iterations=$ITERATIONS"
            echo "production-deploy-executed=false"
            echo "docker-push-executed=false"
            echo "aws-ecr-ssh-executed=false"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Java 21 with Gradle cache
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Go
        id: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: monitor-bot/go.mod
          cache: true
          cache-dependency-path: monitor-bot/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Docker BuildKit cache
        id: buildkit-cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: cd-dry-run-buildx-${{ runner.os }}-${{ matrix.side }}-${{ hashFiles('Dockerfile', 'monitor-bot/Dockerfile', 'monitor-bot/go.sum') }}
          restore-keys: |
            cd-dry-run-buildx-${{ runner.os }}-${{ matrix.side }}-

      - name: Log cache inputs
        run: |
          echo "gradle-cache-configured=true"
          echo "gradle-cache-hit=확인 필요"
          echo "go-cache-configured=true"
          echo "setup-go-cache-hit=${{ steps.setup-go.outputs.cache-hit }}"
          echo "buildkit-cache-configured=true"
          echo "buildkit-cache-hit=${{ steps.buildkit-cache.outputs.cache-hit }}"
          sha256sum gradle/libs.versions.toml 2>/dev/null || true
          sha256sum build.gradle.kts settings.gradle.kts gradlew monitor-bot/go.sum

      - name: Run CD dry-run measurement
        id: run-measurement
        env:
          BASELINE_REF: ${{ inputs.baseline_ref }}
          CANDIDATE_REF: ${{ inputs.candidate_ref }}
          GRADLE_CACHE_CONFIGURED: "true"
          GRADLE_CACHE_HIT: "확인 필요"
          GO_CACHE_CONFIGURED: "true"
          GO_CACHE_HIT: ${{ steps.setup-go.outputs.cache-hit }}
          BUILDKIT_CACHE_CONFIGURED: "true"
          BUILDKIT_CACHE_HIT: ${{ steps.buildkit-cache.outputs.cache-hit }}
        run: |
          set -Eeuo pipefail

          RESULT_DIR="$RUNNER_TEMP/cd-dry-run-measurements"
          mkdir -p "$RESULT_DIR"
          runs_jsonl="$RESULT_DIR/cd-dry-run-${MEASURE_SIDE}.jsonl"
          result_json="$RESULT_DIR/cd-dry-run-${MEASURE_SIDE}.json"
          : > "$runs_jsonl"

          run_backend_test_and_jar() {
            ./gradlew test bootJar --build-cache --no-daemon
            test -f build/libs/app.jar
          }

          run_monitor_bot_tests() {
            (cd monitor-bot && go test ./...)
          }

          docker_build_local() {
            local cache_name="$1"
            local context="$2"
            local tag="$3"
            local cache_dir="/tmp/.buildx-cache/${cache_name}"
            local new_cache_dir="/tmp/.buildx-cache-new/${cache_name}"

            mkdir -p "$cache_dir"
            rm -rf "$new_cache_dir"

            docker buildx build \
              --load \
              --progress=plain \
              --cache-from "type=local,src=${cache_dir}" \
              --cache-to "type=local,dest=${new_cache_dir},mode=max" \
              --tag "$tag" \
              "$context"

            rm -rf "$cache_dir"
            mv "$new_cache_dir" "$cache_dir"
          }

          run_cd_dry_run() {
            run_backend_test_and_jar
            run_monitor_bot_tests
            docker_build_local gateway . "aandi-gateway-server:cd-dry-run-${MEASURE_SIDE}"
            docker_build_local monitor-bot ./monitor-bot "aandi-gateway-monitor-bot:cd-dry-run-${MEASURE_SIDE}"
          }

          failure_count=0
          for iteration in $(seq 1 "$ITERATIONS"); do
            echo "::group::cd-dry-run ${MEASURE_SIDE} iteration ${iteration}/${ITERATIONS}"
            start_ns="$(date +%s%N)"
            set +e
            (
              set -Eeuo pipefail
              run_cd_dry_run
            )
            status_code="$?"
            set -e
            end_ns="$(date +%s%N)"
            if [ "$status_code" -eq 0 ]; then
              status="success"
            else
              status="failure"
              failure_count=$((failure_count + 1))
            fi

            python3 - "$runs_jsonl" "$iteration" "$status" "$status_code" "$start_ns" "$end_ns" <<'PY'
          import json
          import sys

          output_path, iteration, status, status_code, start_ns, end_ns = sys.argv[1:]
          duration_seconds = (int(end_ns) - int(start_ns)) / 1_000_000_000
          with open(output_path, "a", encoding="utf-8") as handle:
              handle.write(json.dumps({
                  "iteration": int(iteration),
                  "status": status,
                  "exit_code": int(status_code),
                  "duration_seconds": round(duration_seconds, 3),
              }, ensure_ascii=False) + "\n")
          PY
            echo "::endgroup::"
          done

          python3 - "$runs_jsonl" "$result_json" <<'PY'
          import json
          import os
          import sys

          runs_path, result_path = sys.argv[1:]
          with open(runs_path, encoding="utf-8") as handle:
              runs = [json.loads(line) for line in handle if line.strip()]

          payload = {
              "repository": "Team-AnI/A-AND-I-GATEWAY-SERVER",
              "baseline_ref": os.environ["BASELINE_REF"],
              "candidate_ref": os.environ["CANDIDATE_REF"],
              "measurement_profile": os.environ["MEASUREMENT_PROFILE"],
              "scope": os.environ["MEASURE_SCOPE"],
              "side": os.environ["MEASURE_SIDE"],
              "iterations_requested": int(os.environ["ITERATIONS"]),
              "runs": runs,
              "gradle_cache_configured": os.environ["GRADLE_CACHE_CONFIGURED"] == "true",
              "gradle_cache_hit_observed": os.environ.get("GRADLE_CACHE_HIT") or "확인 필요",
              "go_cache_configured": os.environ["GO_CACHE_CONFIGURED"] == "true",
              "go_cache_hit_observed": os.environ.get("GO_CACHE_HIT") or "확인 필요",
              "buildkit_cache_configured": os.environ["BUILDKIT_CACHE_CONFIGURED"] == "true",
              "buildkit_cache_hit_observed": os.environ.get("BUILDKIT_CACHE_HIT") or "확인 필요",
              "production_deploy_executed": False,
              "docker_push_executed": False,
              "aws_ecr_ssh_executed": False,
          }
          with open(result_path, "w", encoding="utf-8") as handle:
              json.dump(payload, handle, ensure_ascii=False, indent=2)
              handle.write("\n")
          PY

          echo "failure_count=$failure_count" >> "$GITHUB_OUTPUT"

      - name: Upload CD dry-run measurement result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-cd-dry-run-${{ matrix.side }}-${{ github.run_id }}
          path: ${{ runner.temp }}/cd-dry-run-measurements/cd-dry-run-${{ matrix.side }}.json
          if-no-files-found: error

      - name: Fail failed measurement scope
        if: steps.run-measurement.outputs.failure_count != '0'
        run: |
          echo "CD dry-run ${MEASURE_SIDE} had ${{ steps.run-measurement.outputs.failure_count }} failed iteration(s)" >&2
          exit 1

  finalize:
    name: Finalize CD dry-run metrics
    runs-on: ubuntu-latest
    needs: measure
    if: always()

    steps:
      - name: Checkout workflow ref
        uses: actions/checkout@v4

      - name: Download CD dry-run measurement results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: gateway-cd-dry-run-*
          path: ${{ runner.temp }}/cd-dry-run-results

      - name: Aggregate CD dry-run metrics
        if: always()
        run: |
          python3 scripts/ci/aggregate_cd_dry_run_measurement.py \
            --input-dir "$RUNNER_TEMP/cd-dry-run-results" \
            --output docs/metrics/gateway-cd-dry-run-remeasure.json \
            --baseline-ref "${{ inputs.baseline_ref }}" \
            --candidate-ref "${{ inputs.candidate_ref }}" \
            --iterations "${{ inputs.iterations }}" \
            --measurement-profile "${{ inputs.measurement_profile }}"

      - name: Validate CD dry-run metrics
        run: python3 scripts/ci/validate_cd_dry_run_measurement.py docs/metrics/gateway-cd-dry-run-remeasure.json

      - name: Upload final CD dry-run metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gateway-cd-dry-run-remeasure-${{ github.run_id }}
          path: docs/metrics/gateway-cd-dry-run-remeasure.json
          if-no-files-found: error
