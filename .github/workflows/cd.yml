name: CD

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      ECR_REPOSITORY: aandi-gateway-server
      CONTAINER_NAME: aandi-gateway-server
      BOT_CONTAINER_NAME: aandi-gateway-discord-bot
      AWS_REGION: ${{ secrets.AWS_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: monitor-bot/go.mod

      - name: Run tests
        run: ./gradlew test

      - name: Test monitor-bot
        run: |
          cd monitor-bot
          go test ./...

      - name: Build JAR
        run: ./gradlew build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: github-actions-cd
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}

      - name: Build and push monitor-bot Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./monitor-bot
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:monitor-bot-${{ github.ref_name }}

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
            AWS_REGION="${{ env.AWS_REGION }}"
            IMAGE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${{ github.ref_name }}"
            BOT_IMAGE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:monitor-bot-${{ github.ref_name }}"
            DOMAIN="api.aandiclub.com"
            AUTH_ISSUER_URI="${{ vars.AUTH_ISSUER_URI }}"
            AUTH_AUDIENCE="${{ vars.AUTH_AUDIENCE }}"
            ALLOWED_HOSTS="${{ vars.ALLOWED_HOSTS }}"
            ALLOW_PRIVATE_IP_HOST="${{ vars.ALLOW_PRIVATE_IP_HOST }}"
            ENFORCE_HTTPS="${{ vars.ENFORCE_HTTPS }}"
            CORS_ALLOWED_ORIGIN_PATTERNS="${{ vars.CORS_ALLOWED_ORIGIN_PATTERNS }}"
            DISCORD_APPLICATION_ID="${{ secrets.DISCORD_APPLICATION_ID }}"
            DISCORD_PUBLIC_KEY="${{ secrets.DISCORD_PUBLIC_KEY }}"
            DISCORD_BOT_TOKEN="${{ secrets.DISCORD_BOT_TOKEN }}"
            DISCORD_ALLOWED_GUILD_ID="${{ secrets.DISCORD_ALLOWED_GUILD_ID }}"
            DISCORD_ALLOWED_ROLE_IDS="${{ secrets.DISCORD_ALLOWED_ROLE_IDS }}"
            DISCORD_REGISTER_COMMANDS="${{ vars.DISCORD_REGISTER_COMMANDS }}"
            LOG_GROUP_GATEWAY="${{ vars.LOG_GROUP_GATEWAY }}"
            LOG_GROUP_REPORT="${{ vars.LOG_GROUP_REPORT }}"
            LOG_GROUP_AUTH="${{ vars.LOG_GROUP_AUTH }}"
            LOG_GROUP_ONLINE_JUDGE="${{ vars.LOG_GROUP_ONLINE_JUDGE }}"
            LOG_GROUP_POST="${{ vars.LOG_GROUP_POST }}"
            HEALTH_URL_REPORT="${{ vars.HEALTH_URL_REPORT }}"
            HEALTH_URL_AUTH="${{ vars.HEALTH_URL_AUTH }}"
            HEALTH_URL_ONLINE_JUDGE="${{ vars.HEALTH_URL_ONLINE_JUDGE }}"
            HEALTH_URL_POST="${{ vars.HEALTH_URL_POST }}"
            CLOUDWATCH_QUERY_TIMEOUT_SECONDS="${{ vars.CLOUDWATCH_QUERY_TIMEOUT_SECONDS }}"
            CLOUDWATCH_QUERY_POLL_INTERVAL_MS="${{ vars.CLOUDWATCH_QUERY_POLL_INTERVAL_MS }}"
            CLOUDWATCH_QUERY_LIMIT="${{ vars.CLOUDWATCH_QUERY_LIMIT }}"
            DASHBOARD_ENABLED="${{ vars.DASHBOARD_ENABLED }}"
            DISCORD_DASHBOARD_CHANNEL_ID="${{ secrets.DISCORD_DASHBOARD_CHANNEL_ID }}"
            DASHBOARD_REFRESH_INTERVAL_SECONDS="${{ vars.DASHBOARD_REFRESH_INTERVAL_SECONDS }}"
            DASHBOARD_SINCE="${{ vars.DASHBOARD_SINCE }}"
            ALERT_ENABLED="${{ vars.ALERT_ENABLED }}"
            DISCORD_ALERT_CHANNEL_ID="${{ secrets.DISCORD_ALERT_CHANNEL_ID }}"
            ALERT_POLL_INTERVAL_SECONDS="${{ vars.ALERT_POLL_INTERVAL_SECONDS }}"
            ALERT_COOLDOWN_SECONDS="${{ vars.ALERT_COOLDOWN_SECONDS }}"
            ALERT_5XX_THRESHOLD_5M="${{ vars.ALERT_5XX_THRESHOLD_5M }}"
            ALERT_ERROR_THRESHOLD_5M="${{ vars.ALERT_ERROR_THRESHOLD_5M }}"
            ALERT_HEALTH_DOWN_CONSECUTIVE="${{ vars.ALERT_HEALTH_DOWN_CONSECUTIVE }}"
            ALERT_NO_LOGS_MINUTES="${{ vars.ALERT_NO_LOGS_MINUTES }}"
            ALERT_COPY_API_5XX_THRESHOLD_5M="${{ vars.ALERT_COPY_API_5XX_THRESHOLD_5M }}"
            MAX_CLOUDWATCH_QUERIES_PER_TICK="${{ vars.MAX_CLOUDWATCH_QUERIES_PER_TICK }}"
            AUTH_SERVICE_URI="${{ secrets.AUTH_SERVICE_URI }}"
            REPORT_SERVICE_URI="${{ secrets.REPORT_SERVICE_URI }}"
            POST_SERVICE_URI="${{ secrets.POST_SERVICE_URI }}"
            ONLINE_JUDGE_SERVICE_URI="${{ secrets.ONLINE_JUDGE_SERVICE_URI }}"
            AUTH_JWT_SECRET="${{ secrets.AUTH_JWT_SECRET }}"

            if [ -z "$AUTH_ISSUER_URI" ]; then AUTH_ISSUER_URI="${{ secrets.AUTH_ISSUER_URI }}"; fi
            if [ -z "$AUTH_AUDIENCE" ]; then AUTH_AUDIENCE="${{ secrets.AUTH_AUDIENCE }}"; fi
            if [ -z "$ALLOWED_HOSTS" ]; then ALLOWED_HOSTS="${{ secrets.ALLOWED_HOSTS }}"; fi
            if [ -z "$ALLOW_PRIVATE_IP_HOST" ]; then ALLOW_PRIVATE_IP_HOST="${{ secrets.ALLOW_PRIVATE_IP_HOST }}"; fi
            if [ -z "$ENFORCE_HTTPS" ]; then ENFORCE_HTTPS="${{ secrets.ENFORCE_HTTPS }}"; fi
            if [ -z "$CORS_ALLOWED_ORIGIN_PATTERNS" ]; then CORS_ALLOWED_ORIGIN_PATTERNS="${{ secrets.CORS_ALLOWED_ORIGIN_PATTERNS }}"; fi

            if [ -z "$AUTH_ISSUER_URI" ]; then AUTH_ISSUER_URI="https://auth.aandiclub.com"; fi
            if [ -z "$AUTH_AUDIENCE" ]; then AUTH_AUDIENCE="aandiclub-api"; fi
            if [ -z "$ALLOWED_HOSTS" ]; then ALLOWED_HOSTS="$DOMAIN"; fi
            if [ -z "$ALLOW_PRIVATE_IP_HOST" ]; then ALLOW_PRIVATE_IP_HOST="true"; fi
            if [ -z "$ENFORCE_HTTPS" ]; then ENFORCE_HTTPS="true"; fi
            if [ -z "$CORS_ALLOWED_ORIGIN_PATTERNS" ]; then CORS_ALLOWED_ORIGIN_PATTERNS="https://*"; fi
            if [ -z "$DISCORD_REGISTER_COMMANDS" ]; then DISCORD_REGISTER_COMMANDS="false"; fi
            if [ -z "$LOG_GROUP_GATEWAY" ]; then LOG_GROUP_GATEWAY="/a-and-i/gateway"; fi
            if [ -z "$LOG_GROUP_REPORT" ]; then LOG_GROUP_REPORT="/a-and-i/prod/report"; fi
            if [ -z "$LOG_GROUP_AUTH" ]; then LOG_GROUP_AUTH="/a-and-i/auth"; fi
            if [ -z "$LOG_GROUP_ONLINE_JUDGE" ]; then LOG_GROUP_ONLINE_JUDGE="/a-and-i/online-judge"; fi
            if [ -z "$LOG_GROUP_POST" ]; then LOG_GROUP_POST="/a-and-i/prod/tech-blog"; fi
            if [ -z "$CLOUDWATCH_QUERY_TIMEOUT_SECONDS" ]; then CLOUDWATCH_QUERY_TIMEOUT_SECONDS="8"; fi
            if [ -z "$CLOUDWATCH_QUERY_POLL_INTERVAL_MS" ]; then CLOUDWATCH_QUERY_POLL_INTERVAL_MS="500"; fi
            if [ -z "$CLOUDWATCH_QUERY_LIMIT" ]; then CLOUDWATCH_QUERY_LIMIT="20"; fi
            if [ -z "$DASHBOARD_ENABLED" ]; then DASHBOARD_ENABLED="false"; fi
            if [ -z "$DASHBOARD_REFRESH_INTERVAL_SECONDS" ]; then DASHBOARD_REFRESH_INTERVAL_SECONDS="300"; fi
            if [ -z "$DASHBOARD_SINCE" ]; then DASHBOARD_SINCE="30m"; fi
            if [ -z "$ALERT_ENABLED" ]; then ALERT_ENABLED="false"; fi
            if [ -z "$ALERT_POLL_INTERVAL_SECONDS" ]; then ALERT_POLL_INTERVAL_SECONDS="180"; fi
            if [ -z "$ALERT_COOLDOWN_SECONDS" ]; then ALERT_COOLDOWN_SECONDS="900"; fi
            if [ -z "$ALERT_5XX_THRESHOLD_5M" ]; then ALERT_5XX_THRESHOLD_5M="3"; fi
            if [ -z "$ALERT_ERROR_THRESHOLD_5M" ]; then ALERT_ERROR_THRESHOLD_5M="5"; fi
            if [ -z "$ALERT_HEALTH_DOWN_CONSECUTIVE" ]; then ALERT_HEALTH_DOWN_CONSECUTIVE="2"; fi
            if [ -z "$ALERT_NO_LOGS_MINUTES" ]; then ALERT_NO_LOGS_MINUTES="30"; fi
            if [ -z "$ALERT_COPY_API_5XX_THRESHOLD_5M" ]; then ALERT_COPY_API_5XX_THRESHOLD_5M="1"; fi
            if [ -z "$MAX_CLOUDWATCH_QUERIES_PER_TICK" ]; then MAX_CLOUDWATCH_QUERIES_PER_TICK="6"; fi

            [ -n "$AUTH_SERVICE_URI" ] || { echo "Missing secret: AUTH_SERVICE_URI"; exit 1; }
            [ -n "$REPORT_SERVICE_URI" ] || { echo "Missing secret: REPORT_SERVICE_URI"; exit 1; }
            [ -n "$POST_SERVICE_URI" ] || { echo "Missing secret: POST_SERVICE_URI"; exit 1; }
            [ -n "$ONLINE_JUDGE_SERVICE_URI" ] || { echo "Missing secret: ONLINE_JUDGE_SERVICE_URI"; exit 1; }
            [ -n "$AUTH_JWT_SECRET" ] || { echo "Missing secret: AUTH_JWT_SECRET"; exit 1; }
            [ -n "$DISCORD_APPLICATION_ID" ] || { echo "Missing secret: DISCORD_APPLICATION_ID"; exit 1; }
            [ -n "$DISCORD_PUBLIC_KEY" ] || { echo "Missing secret: DISCORD_PUBLIC_KEY"; exit 1; }
            [ -n "$DISCORD_BOT_TOKEN" ] || { echo "Missing secret: DISCORD_BOT_TOKEN"; exit 1; }
            [ -n "$DISCORD_ALLOWED_GUILD_ID" ] || { echo "Missing secret: DISCORD_ALLOWED_GUILD_ID"; exit 1; }
            [ -n "$DISCORD_ALLOWED_ROLE_IDS" ] || { echo "Missing secret: DISCORD_ALLOWED_ROLE_IDS"; exit 1; }

            aws ecr get-login-password --region "${{ env.AWS_REGION }}" | sudo docker login --username AWS --password-stdin "${ECR_REGISTRY}"
            sudo mkdir -p /opt/aandi/gateway
            sudo mkdir -p /opt/aandi/gateway/nginx /opt/aandi/gateway/certbot/conf /opt/aandi/gateway/certbot/www
            sudo docker rm -f \
              ${{ env.CONTAINER_NAME }} \
              ${{ env.BOT_CONTAINER_NAME }} || true
            sudo tee /opt/aandi/gateway/nginx/bootstrap.conf >/dev/null <<EOF_BOOTSTRAP
            server {
              listen 80;
              server_name ${DOMAIN};

              location /.well-known/acme-challenge/ {
                root /var/www/certbot;
              }

              location / {
                return 200 'cert-bootstrap';
              }
            }
            EOF_BOOTSTRAP

            if [ ! -f "/opt/aandi/gateway/certbot/conf/live/${DOMAIN}/fullchain.pem" ]; then
              sudo tee /opt/aandi/gateway/docker-compose.bootstrap.yml >/dev/null <<EOF_BOOTSTRAP_COMPOSE
            services:
              nginx:
                image: nginx:1.27-alpine
                container_name: aandi-gateway-nginx-bootstrap
                restart: unless-stopped
                ports:
                  - "80:80"
                volumes:
                  - /opt/aandi/gateway/nginx/bootstrap.conf:/etc/nginx/conf.d/default.conf:ro
                  - /opt/aandi/gateway/certbot/www:/var/www/certbot:ro
            EOF_BOOTSTRAP_COMPOSE
              cd /opt/aandi/gateway
              sudo docker compose -f docker-compose.bootstrap.yml up -d
              sudo docker run --rm \
                -v /opt/aandi/gateway/certbot/www:/var/www/certbot \
                -v /opt/aandi/gateway/certbot/conf:/etc/letsencrypt \
                certbot/certbot certonly --webroot \
                -w /var/www/certbot \
                -d "${DOMAIN}" \
                --email "${{ secrets.LETSENCRYPT_EMAIL }}" \
                --agree-tos \
                --no-eff-email
              sudo docker compose -f docker-compose.bootstrap.yml down
            fi

            sudo tee /opt/aandi/gateway/nginx/gateway.conf >/dev/null <<EOF_NGINX
            server {
              listen 80;
              server_name ${DOMAIN};

              location /.well-known/acme-challenge/ {
                root /var/www/certbot;
              }

              location / {
                return 301 https://\$host\$request_uri;
              }
            }

            server {
              listen 443 ssl;
              http2 on;
              server_name ${DOMAIN};

              ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
              ssl_session_timeout 1d;
              ssl_session_cache shared:SSL:10m;
              ssl_protocols TLSv1.2 TLSv1.3;

              location /internal/ {
                allow 172.31.0.0/16;
                deny all;
                proxy_pass http://gateway:8080;
                proxy_set_header Host \$host;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
              }

              location = /discord/interactions {
                proxy_pass http://monitor-bot:8088/interactions;
                proxy_http_version 1.1;
                proxy_set_header Host \$host;
                proxy_set_header X-Real-IP \$remote_addr;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
              }

              location /actuator/ {
                deny all;
                return 403;
              }

              location ~ ^/v1/submissions/[^/]+/stream$ {
                proxy_pass http://gateway:8080;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host \$host;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
                proxy_buffering off;
                proxy_cache off;
                proxy_read_timeout 3600s;
                proxy_send_timeout 3600s;
                add_header X-Accel-Buffering no;
              }

              location / {
                proxy_pass http://gateway:8080;
                proxy_set_header Host \$host;
                proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto \$scheme;
              }
            }
            EOF_NGINX
            sudo tee /opt/aandi/gateway/docker-compose.yml >/dev/null <<EOF
            services:
              nginx:
                image: nginx:1.27-alpine
                container_name: aandi-gateway-nginx
                restart: unless-stopped
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - /opt/aandi/gateway/nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
                  - /opt/aandi/gateway/certbot/conf:/etc/letsencrypt:ro
                  - /opt/aandi/gateway/certbot/www:/var/www/certbot:ro
                depends_on:
                  - gateway
                  - monitor-bot

              gateway:
                image: ${IMAGE_URI}
                container_name: ${{ env.CONTAINER_NAME }}
                restart: unless-stopped
                logging:
                  driver: awslogs
                  options:
                    awslogs-region: "${{ env.AWS_REGION }}"
                    awslogs-group: "/a-and-i/gateway"
                    awslogs-stream: "gateway"
                    awslogs-create-group: "true"
                environment:
                  GATEWAY_AUTH_ENABLED: "true"
                  AUTH_ISSUER_URI: "${AUTH_ISSUER_URI}"
                  AUTH_AUDIENCE: "${AUTH_AUDIENCE}"
                  AUTH_JWT_SECRET: "${AUTH_JWT_SECRET}"
                  AUTH_SERVICE_URI: "${AUTH_SERVICE_URI}"
                  REPORT_SERVICE_URI: "${REPORT_SERVICE_URI}"
                  POST_SERVICE_URI: "${POST_SERVICE_URI}"
                  ONLINE_JUDGE_SERVICE_URI: "${ONLINE_JUDGE_SERVICE_URI}"
                  ENFORCE_HTTPS: "${ENFORCE_HTTPS}"
                  ALLOWED_HOSTS: "${ALLOWED_HOSTS}"
                  ALLOW_PRIVATE_IP_HOST: "${ALLOW_PRIVATE_IP_HOST}"
                  CORS_ALLOWED_ORIGIN_PATTERNS: "${CORS_ALLOWED_ORIGIN_PATTERNS}"
                  AUTH_JWT_CLOCK_SKEW_SECONDS: "30"
                  AUTH_RATE_LIMIT_ENABLED: "true"
                  AUTH_LOGIN_RATE_LIMIT_PER_MINUTE: "10"
                  AUTH_REFRESH_RATE_LIMIT_PER_MINUTE: "30"
                  AUTH_LOGOUT_RATE_LIMIT_PER_MINUTE: "30"
                  PREVALIDATE_REFRESH_TOKEN_TYPE: "true"
                  ENFORCE_METHOD_PATH_ALLOWLIST: "true"
                  ENFORCE_JSON_CONTENT_TYPE: "true"
                  MAX_REQUEST_BODY_SIZE: "2MB"
                  MAX_REQUEST_HEADER_SIZE: "16KB"
                  INTERNAL_EVENT_TOKEN: "${{ secrets.INTERNAL_EVENT_TOKEN }}"
                  REDIS_HOST: redis
                  REDIS_PORT: "6379"
                  REDIS_PASSWORD: "${{ secrets.REDIS_PASSWORD }}"
                  MANAGEMENT_SERVER_PORT: "9090"
                  MANAGEMENT_SERVER_ADDRESS: "0.0.0.0"
                depends_on:
                  redis:
                    condition: service_healthy

              monitor-bot:
                image: ${BOT_IMAGE_URI}
                container_name: ${{ env.BOT_CONTAINER_NAME }}
                restart: unless-stopped
                mem_limit: 96m
                memswap_limit: 192m
                cpus: "0.20"
                environment:
                  AWS_REGION: "${AWS_REGION}"
                  BOT_HTTP_PORT: "8088"
                  DISCORD_APPLICATION_ID: "${DISCORD_APPLICATION_ID}"
                  DISCORD_PUBLIC_KEY: "${DISCORD_PUBLIC_KEY}"
                  DISCORD_BOT_TOKEN: "${DISCORD_BOT_TOKEN}"
                  DISCORD_ALLOWED_GUILD_ID: "${DISCORD_ALLOWED_GUILD_ID}"
                  DISCORD_ALLOWED_ROLE_IDS: "${DISCORD_ALLOWED_ROLE_IDS}"
                  DISCORD_REGISTER_COMMANDS: "${DISCORD_REGISTER_COMMANDS}"
                  LOG_GROUP_GATEWAY: "${LOG_GROUP_GATEWAY}"
                  LOG_GROUP_REPORT: "${LOG_GROUP_REPORT}"
                  LOG_GROUP_AUTH: "${LOG_GROUP_AUTH}"
                  LOG_GROUP_ONLINE_JUDGE: "${LOG_GROUP_ONLINE_JUDGE}"
                  LOG_GROUP_POST: "${LOG_GROUP_POST}"
                  HEALTH_URL_GATEWAY: "http://gateway:9090/actuator/health"
                  HEALTH_URL_REPORT: "${HEALTH_URL_REPORT}"
                  HEALTH_URL_AUTH: "${HEALTH_URL_AUTH}"
                  HEALTH_URL_ONLINE_JUDGE: "${HEALTH_URL_ONLINE_JUDGE}"
                  HEALTH_URL_POST: "${HEALTH_URL_POST}"
                  CLOUDWATCH_QUERY_TIMEOUT_SECONDS: "${CLOUDWATCH_QUERY_TIMEOUT_SECONDS}"
                  CLOUDWATCH_QUERY_POLL_INTERVAL_MS: "${CLOUDWATCH_QUERY_POLL_INTERVAL_MS}"
                  CLOUDWATCH_QUERY_LIMIT: "${CLOUDWATCH_QUERY_LIMIT}"
                  DASHBOARD_ENABLED: "${DASHBOARD_ENABLED}"
                  DISCORD_DASHBOARD_CHANNEL_ID: "${DISCORD_DASHBOARD_CHANNEL_ID}"
                  DASHBOARD_REFRESH_INTERVAL_SECONDS: "${DASHBOARD_REFRESH_INTERVAL_SECONDS}"
                  DASHBOARD_SINCE: "${DASHBOARD_SINCE}"
                  ALERT_ENABLED: "${ALERT_ENABLED}"
                  DISCORD_ALERT_CHANNEL_ID: "${DISCORD_ALERT_CHANNEL_ID}"
                  ALERT_POLL_INTERVAL_SECONDS: "${ALERT_POLL_INTERVAL_SECONDS}"
                  ALERT_COOLDOWN_SECONDS: "${ALERT_COOLDOWN_SECONDS}"
                  ALERT_5XX_THRESHOLD_5M: "${ALERT_5XX_THRESHOLD_5M}"
                  ALERT_ERROR_THRESHOLD_5M: "${ALERT_ERROR_THRESHOLD_5M}"
                  ALERT_HEALTH_DOWN_CONSECUTIVE: "${ALERT_HEALTH_DOWN_CONSECUTIVE}"
                  ALERT_NO_LOGS_MINUTES: "${ALERT_NO_LOGS_MINUTES}"
                  ALERT_COPY_API_5XX_THRESHOLD_5M: "${ALERT_COPY_API_5XX_THRESHOLD_5M}"
                  MAX_CLOUDWATCH_QUERIES_PER_TICK: "${MAX_CLOUDWATCH_QUERIES_PER_TICK}"
                volumes:
                  - monitor-bot-state:/var/lib/monitor-bot
                depends_on:
                  gateway:
                    condition: service_started
                logging:
                  driver: awslogs
                  options:
                    awslogs-region: "${AWS_REGION}"
                    awslogs-group: "/a-and-i/prod/monitor-bot"
                    awslogs-stream: "gateway-discord-bot"
                    awslogs-create-group: "true"
                healthcheck:
                  test: ["/monitor-bot", "healthcheck", "--url", "http://127.0.0.1:8088/healthz"]
                  interval: 30s
                  timeout: 3s
                  retries: 3
                  start_period: 20s

              redis:
                image: redis:7-alpine
                container_name: aandi-gateway-redis
                restart: unless-stopped
                environment:
                  REDIS_PASSWORD: "${{ secrets.REDIS_PASSWORD }}"
                command: >
                  sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then
                  exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
                  else
                  exec redis-server --appendonly yes;
                  fi'
                healthcheck:
                  test: ["CMD", "redis-cli", "ping"]
                  interval: 5s
                  timeout: 3s
                  retries: 5

            volumes:
              monitor-bot-state:
            EOF
            cd /opt/aandi/gateway
            sudo docker compose pull gateway monitor-bot
            sudo docker compose up -d --no-deps gateway
            sudo docker compose up -d --no-deps monitor-bot
            if sudo docker ps --format '{{.Names}}' | grep -qx 'aandi-gateway-nginx'; then
              sudo docker exec aandi-gateway-nginx nginx -t
              sudo docker exec aandi-gateway-nginx nginx -s reload
            else
              sudo docker compose up -d nginx
            fi
            sudo docker run --rm \
              -v /opt/aandi/gateway/certbot/www:/var/www/certbot \
              -v /opt/aandi/gateway/certbot/conf:/etc/letsencrypt \
              certbot/certbot renew --webroot -w /var/www/certbot --quiet || true
            sudo docker image prune -af
