spring:
  application:
    name: gateway

  codec:
    max-in-memory-size: ${MAX_REQUEST_BODY_SIZE:2MB}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:https://*}
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowed-headers: "*"
                exposed-headers:
                  - X-Auth-Context-Cache
                allow-credentials: false
                max-age: 3600
          default-filters:
            - RequestSize=${MAX_REQUEST_BODY_SIZE:2MB}
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
          routes:
            - id: auth-service-v1-login
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/auth/login
                - Method=POST
            - id: auth-service-v1-refresh
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/auth/refresh
                - Method=POST
            - id: auth-service-v1-logout
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/auth/logout
                - Method=POST
            - id: auth-service-v1-me
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/me
                - Method=GET
            - id: auth-service-v1-me-post
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/me
                - Method=POST
            - id: auth-service-v1-me-patch
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/me
                - Method=PATCH
            - id: auth-service-v1-me-password
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/me/password
                - Method=POST
            - id: auth-service-v1-admin-ping
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/admin/ping
                - Method=GET
            - id: auth-service-v1-admin-users-get
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/admin/users
                - Method=GET
            - id: auth-service-v1-admin-users-post
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/admin/users
                - Method=POST
            - id: auth-service-v1-admin-users-sync-post
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/admin/users/sync
                - Method=POST
            - id: auth-service-v1-admin-invite-mail-post
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/admin/invite-mail
                - Method=POST
            - id: auth-service-v1-admin-users-role-patch
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/admin/users/role
                - Method=PATCH
            - id: auth-service-v1-admin-users-patch
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/admin/users/**
                - Method=PATCH
            - id: auth-service-v1-admin-users-reset-password
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/admin/users/*/reset-password
                - Method=POST
            - id: auth-service-v1-admin-users-delete
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/admin/users/**
                - Method=DELETE
            - id: auth-service-v1-users-root
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/users
            - id: auth-service-v1-users-subpaths
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v1/users/**

            - id: auth-service-login
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/login
                - Method=POST
            - id: auth-service-refresh
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/refresh
                - Method=POST
            - id: auth-service-logout
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/logout
                - Method=POST
            - id: auth-service-activate
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/activate
                - Method=POST
            - id: auth-service-me
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/me
                - Method=GET
            - id: auth-service-me-post
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/me
                - Method=POST
            - id: auth-service-me-patch
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/me
                - Method=PATCH
            - id: auth-service-me-password-post
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/me/password
                - Method=POST
            - id: auth-service-admin-ping
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/admin/ping
                - Method=GET
            - id: auth-service-admin-users-get
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/admin/users
                - Method=GET
            - id: auth-service-admin-users-post
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/admin/users
                - Method=POST
            - id: auth-service-admin-users-sync-post
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/admin/users/sync
                - Method=POST
            - id: auth-service-admin-invite-mail-post
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/admin/invite-mail
                - Method=POST
            - id: auth-service-admin-users-role-patch
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/admin/users/role
                - Method=PATCH
            - id: auth-service-admin-users-patch
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/admin/users/**
                - Method=PATCH
            - id: auth-service-admin-users-reset-password
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/admin/users/*/reset-password
                - Method=POST
            - id: auth-service-admin-users-delete-root
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/admin/users
                - Method=DELETE
            - id: auth-service-admin-users-delete
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/admin/users/**
                - Method=DELETE
            - id: auth-service-users-root
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/users
            - id: auth-service-users-subpaths
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/users/**

            - id: report-service-root
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v2/report
            - id: report-service-subpaths
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v2/report/**
            - id: report-service-v1-root
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v1/report
              filters:
                - SetPath=/v1/report
            - id: report-service-v1-subpaths
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v1/report/**
              filters:
                - RewritePath=/v1/report/(?<segment>.*), /v1/report/$\{segment}

            - id: post-service-v1-posts-images
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v1/posts/images
                - Method=POST
            - id: post-service-v1-posts-root-get
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v1/posts
                - Method=GET
            - id: post-service-v1-posts-root-post
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v1/posts
                - Method=POST
            - id: post-service-v1-posts-drafts-me
              order: -1
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v1/posts/drafts/me
                - Method=GET
            - id: post-service-v1-posts-drafts
              order: -1
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v1/posts/drafts
                - Method=GET
            - id: post-service-v1-posts-subpaths-get
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v1/posts/**
                - Method=GET
            - id: post-service-v1-posts-subpaths-patch
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v1/posts/**
                - Method=PATCH
            - id: post-service-v1-posts-subpaths-delete
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v1/posts/**
                - Method=DELETE
            - id: report-service-v1-admin-courses-root-get
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v1/admin/courses
                - Method=GET
            - id: report-service-v1-admin-courses-root-post
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v1/admin/courses
                - Method=POST
            - id: report-service-v1-admin-courses-subpaths
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v1/admin/courses/**
            - id: report-service-v1-courses-root
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v1/courses
            - id: report-service-v1-courses-subpaths
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v1/courses/**

            - id: report-service-v2-admin-courses-root
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v2/admin/courses
            - id: report-service-v2-admin-courses-subpaths
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v2/admin/courses/**
            - id: report-service-v2-courses-root
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v2/courses
            - id: report-service-v2-courses-subpaths
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v2/courses/**
            - id: report-service-v2-assignment-course
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v2/assignments/*/course
                - Method=GET

            - id: online-judge-service-v1-submissions-root-post
              uri: ${ONLINE_JUDGE_SERVICE_URI:https://localhost:8080}
              predicates:
                - Path=/v1/submissions
                - Method=POST
            - id: online-judge-service-v1-problem-submissions-me-get
              uri: ${ONLINE_JUDGE_SERVICE_URI:https://localhost:8080}
              predicates:
                - Path=/v1/problems/{problemId}/submissions/me
                - Method=GET
            - id: online-judge-service-v1-admin-submissions-get
              uri: ${ONLINE_JUDGE_SERVICE_URI:https://localhost:8080}
              predicates:
                - Path=/v1/admin/submissions
                - Method=GET
            - id: online-judge-service-v1-admin-testcases-get
              uri: ${ONLINE_JUDGE_SERVICE_URI:https://localhost:8080}
              predicates:
                - Path=/v1/admin/testcases
                - Method=GET
            - id: online-judge-service-v1-submissions-stream-get
              uri: ${ONLINE_JUDGE_SERVICE_URI:https://localhost:8080}
              predicates:
                - Path=/v1/submissions/{submissionId}/stream
                - Method=GET
              metadata:
                response-timeout: 3600000
            - id: online-judge-service-v1-submissions-by-id-get
              uri: ${ONLINE_JUDGE_SERVICE_URI:https://localhost:8080}
              predicates:
                - Path=/v1/submissions/{submissionId}
                - Method=GET

            - id: online-judge-service-v2-submissions-root-post
              uri: ${ONLINE_JUDGE_SERVICE_URI:https://localhost:8080}
              predicates:
                - Path=/v2/online-judge/submissions
                - Method=POST
            - id: online-judge-service-v2-problem-submissions-me-get
              uri: ${ONLINE_JUDGE_SERVICE_URI:https://localhost:8080}
              predicates:
                - Path=/v2/online-judge/problems/{problemId}/submissions/me
                - Method=GET
            - id: online-judge-service-v2-admin-submissions-get
              uri: ${ONLINE_JUDGE_SERVICE_URI:https://localhost:8080}
              predicates:
                - Path=/v2/online-judge/admin/submissions
                - Method=GET
            - id: online-judge-service-v2-admin-testcases-get
              uri: ${ONLINE_JUDGE_SERVICE_URI:https://localhost:8080}
              predicates:
                - Path=/v2/online-judge/admin/testcases
                - Method=GET
            - id: online-judge-service-v2-submissions-stream-get
              uri: ${ONLINE_JUDGE_SERVICE_URI:https://localhost:8080}
              predicates:
                - Path=/v2/online-judge/submissions/{submissionId}/stream
                - Method=GET
              metadata:
                response-timeout: 3600000
            - id: online-judge-service-v2-submissions-by-id-get
              uri: ${ONLINE_JUDGE_SERVICE_URI:https://localhost:8080}
              predicates:
                - Path=/v2/online-judge/submissions/{submissionId}
                - Method=GET

            - id: post-service-openapi-root
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v2/post/v3/api-docs
              filters:
                - SetPath=/v3/api-docs
            - id: post-service-openapi-subpaths
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v2/post/v3/api-docs/**
              filters:
                - RewritePath=/v2/post/v3/api-docs/(?<segment>.*), /v3/api-docs/$\{segment}
            - id: report-service-openapi-root
              order: -1
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v2/report/v3/api-docs
              filters:
                - SetPath=/v3/api-docs
            - id: report-service-openapi-subpaths
              order: -1
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v2/report/v3/api-docs/**
              filters:
                - RewritePath=/v2/report/v3/api-docs/(?<segment>.*), /v3/api-docs/$\{segment}
            - id: auth-service-openapi-root
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/v3/api-docs
              filters:
                - SetPath=/v3/api-docs
            - id: auth-service-openapi-subpaths
              uri: ${AUTH_SERVICE_URI:http://localhost:9000}
              predicates:
                - Path=/v2/auth/v3/api-docs/**
              filters:
                - RewritePath=/v2/auth/v3/api-docs/(?<segment>.*), /v3/api-docs/$\{segment}
            - id: online-judge-service-openapi-root
              uri: ${ONLINE_JUDGE_SERVICE_URI:https://localhost:8080}
              predicates:
                - Path=/v2/online-judge/v3/api-docs
              filters:
                - SetPath=/v3/api-docs
            - id: online-judge-service-openapi-subpaths
              uri: ${ONLINE_JUDGE_SERVICE_URI:https://localhost:8080}
              predicates:
                - Path=/v2/online-judge/v3/api-docs/**
              filters:
                - RewritePath=/v2/online-judge/v3/api-docs/(?<segment>.*), /v3/api-docs/$\{segment}
            - id: post-service-images-root
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v2/post/images
            - id: post-service-images-subpaths
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v2/post/images/**
            - id: post-service-posts-root
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v2/post
            - id: report-service-admin-courses-root
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v2/post/admin/courses
            - id: report-service-admin-courses-subpaths
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v2/post/admin/courses/**
            - id: report-service-courses-root
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v2/post/courses
            - id: report-service-courses-subpaths
              uri: ${REPORT_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/v2/post/courses/**
            - id: post-service-drafts-me
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v2/post/drafts/me
                - Method=GET
            - id: post-service-posts-subpaths
              uri: ${POST_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/v2/post/**
          httpclient:
            connect-timeout: 3000
            response-timeout: 10s

server:
  port: ${SERVER_PORT:8080}
  max-http-request-header-size: ${MAX_REQUEST_HEADER_SIZE:16KB}

security:
  jwt:
    issuer: ${AUTH_ISSUER_URI:http://localhost:9000}
    audience: ${AUTH_AUDIENCE:aandi-gateway}
    secret: ${AUTH_JWT_SECRET:local-dev-jwt-secret-must-be-at-least-32-bytes}
    clock-skew-seconds: ${AUTH_JWT_CLOCK_SKEW_SECONDS:30}

springdoc:
  swagger-ui:
    path: /
    urls:
      - name: report-service-v1
        url: /v2/report/v3/api-docs/v1
      - name: report-service-v2
        url: /v2/report/v3/api-docs/v2
      - name: auth-service-v1
        url: /v2/auth/v3/api-docs/v1
      - name: auth-service-v2
        url: /v2/auth/v3/api-docs/v2
      - name: post-service-v1
        url: /v2/post/v3/api-docs/v1
      - name: post-service-v2
        url: /v2/post/v3/api-docs/v2
      - name: online-judge-service-v1
        url: /v2/online-judge/v3/api-docs/v1
      - name: online-judge-service-v2
        url: /v2/online-judge/v3/api-docs/v2

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9090}
    address: ${MANAGEMENT_SERVER_ADDRESS:127.0.0.1}
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: INFO
    io.lettuce.core: WARN

app:
  security:
    internal-event-token: ${INTERNAL_EVENT_TOKEN}
    policy:
      enforce-https: ${ENFORCE_HTTPS:false}
      enforce-method-path-allowlist: ${ENFORCE_METHOD_PATH_ALLOWLIST:true}
      enforce-json-content-type: ${ENFORCE_JSON_CONTENT_TYPE:true}
      allow-private-ip-host: ${ALLOW_PRIVATE_IP_HOST:true}
      prevalidate-refresh-token-type: ${PREVALIDATE_REFRESH_TOKEN_TYPE:true}
      allowed-hosts: ${ALLOWED_HOSTS:}
    rate-limit:
      enabled: ${AUTH_RATE_LIMIT_ENABLED:true}
      login-per-minute: ${AUTH_LOGIN_RATE_LIMIT_PER_MINUTE:10}
      refresh-per-minute: ${AUTH_REFRESH_RATE_LIMIT_PER_MINUTE:30}
      logout-per-minute: ${AUTH_LOGOUT_RATE_LIMIT_PER_MINUTE:30}
  token-cache:
    ttl: ${TOKEN_CACHE_TTL:24h}
